name: Daily Udong Alert + Signage

on:
  schedule:
    # KST 04:37 = UTC 19:37 (전날)
    # 3시간 버퍼 → 6:30 출근 전 안정 도착
    - cron: '37 19 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  daily-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jinja2

      - name: Run daily alert (Telegram)
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_check.py

      - name: Build digital signage HTML
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
        run: python build_signage.py

      - name: Commit cache + signage (with conflict retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cache/seen_ids.json docs/signage.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily update [$(date -u +%Y-%m-%d)]"
            for i in 1 2 3; do
              if git push; then
                echo "Push succeeded on attempt $i"
                break
              else
                echo "Push failed on attempt $i, pulling and retrying..."
                git pull --rebase origin main
                sleep 2
              fi
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
