name: Daily Udong Alert

on:
  schedule:
    # GitHub Actions cron은 UTC 기준
    # KST 07:00 = UTC 22:00 (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write  # cache/seen_ids.json 자동 커밋용

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily check
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_check.py

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cache/seen_ids.json
          if git diff --cached --quiet; then
            echo "No cache changes to commit."
          else
            git commit -m "chore: update seen_ids cache [$(date -u +%Y-%m-%d)]"
            git push
          fi
